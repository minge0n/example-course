title: "CSS 스타일링 퀴즈"
questions:
  - type: mcq
    text: "CSS 박스 모델에서 요소의 내용과 테두리 사이의 공간은?"
    options:
      - label: A
        text: "margin"
      - label: B
        text: "padding"
      - label: C
        text: "border"
      - label: D
        text: "outline"
    correct: B
    points: 2

  - type: mcq
    text: "2차원 레이아웃(행과 열)에 가장 적합한 CSS 레이아웃 방식은?"
    options:
      - label: A
        text: "Flexbox"
      - label: B
        text: "Float"
      - label: C
        text: "Grid"
      - label: D
        text: "Position"
    correct: C
    points: 2

  - type: short_answer
    text: "Flexbox에서 자식 요소들을 가로 중앙에 정렬하는 속성과 값은? (예: property: value)"
    correct_answer: "justify-content: center"
    points: 2

  - type: essay
    text: "Flexbox와 Grid의 차이를 설명하고, 각각 어떤 상황에서 사용하면 좋은지 예시를 들어 서술하세요."
    points: 5
