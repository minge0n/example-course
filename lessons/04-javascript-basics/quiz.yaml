title: "JavaScript 기초 퀴즈"
questions:
  - type: mcq
    text: "JavaScript에서 재할당이 불가능한 변수 선언 키워드는?"
    options:
      - label: A
        text: "var"
      - label: B
        text: "let"
      - label: C
        text: "const"
      - label: D
        text: "static"
    correct: C
    points: 2

  - type: mcq
    text: "배열 [1, 2, 3].map(n => n * 2)의 결과는?"
    options:
      - label: A
        text: "[2, 4, 6]"
      - label: B
        text: "[1, 2, 3, 1, 2, 3]"
      - label: C
        text: "12"
      - label: D
        text: "[1, 4, 9]"
    correct: A
    points: 2

  - type: short_answer
    text: "DOM에서 CSS 선택자로 요소를 찾는 메서드 이름은?"
    correct_answer: "querySelector"
    points: 1

  - type: short_answer
    text: "배열의 모든 요소를 하나의 값으로 축약하는 배열 메서드 이름은?"
    correct_answer: "reduce"
    points: 1

  - type: essay
    text: "var, let, const의 차이를 스코프, 재선언, 재할당 관점에서 비교하여 설명하세요. 각각 어떤 경우에 사용하는 것이 적절한지도 서술하세요."
    points: 5
